name: filevault
description: Universal File Viewer & Manager for Android
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Plugins (explicitly managed for compatibility)
  audio_session: ^0.2.3

  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^13.0.0
  
  # PDF Viewer
  # PDF Viewer
  pdfx: ^2.6.0

  # Intent handling (incoming opening from share/view)
  receive_sharing_intent: ^1.4.5

  # Image Viewers
  photo_view: ^0.15.0
  extended_image: ^9.0.2
  flutter_svg: ^2.0.10+1
  image: ^4.2.0
  
  # Video Player
  # video_player: ^2.9.2
  # chewie: ^1.8.5
  
  # Audio Player
  just_audio: ^0.10.5
  audio_waveforms: ^1.3.0
  
  # Archive
  archive: ^3.6.1
  
  # Code Viewer
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  
  # EPUB Reader
  # vocsy_epub_viewer: ^3.0.0
  
  # HTML Viewer
  flutter_inappwebview: ^6.0.0
  
  # File Operations
  mime: ^1.0.5
  path: ^1.9.0
  path_provider: ^2.1.3

  permission_handler: ^12.0.1
  shared_preferences: ^2.3.2
  package_info_plus: ^8.0.2
  share_plus: ^12.0.0
  open_filex: ^4.5.0
  file_picker: ^10.3.10
  
  # Image metadata
  exif: ^3.3.0
  
  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3
  installed_apps: ^1.4.0
  
  # UI
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  url_launcher: ^6.3.0
  
  # Document viewers
  excel: ^4.0.1
  csv: ^6.0.0
  xml: ^6.5.0
  yaml: ^3.1.2
  
  # Office document viewers
  syncfusion_flutter_core: ^33.1.44
  syncfusion_flutter_pdf: ^33.1.44
  syncfusion_flutter_pdfviewer: ^33.1.44
  syncfusion_flutter_signaturepad: ^33.1.44
  syncfusion_pdfviewer_macos: ^33.1.44
  syncfusion_pdfviewer_platform_interface: ^33.1.44
  syncfusion_pdfviewer_web: ^33.1.44
  syncfusion_pdfviewer_windows: ^33.1.44
  
  # Material Design
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/icons/
    - assets/images/

flutter_gen:
  output: lib/gen/
  line_length: 80
  
  integrations:
    flutter_svg: true
